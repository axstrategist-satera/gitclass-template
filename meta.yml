# ============================================================
# meta.yml — 自分の作品のタイプを先生（と自動チェック）に伝えるファイル
# ============================================================
#
# ▼ これは何？
#   フォークしたら最初に 1 回だけ、このファイルを編集します。
#   ここで宣言したタイプに合わせて、自動フィードバックの内容が変わります。
#   （書かない・間違った値のままだと、全タイプ共通の観点だけしか
#     チェックされず、自分の作品向けのフィードバックが届きません）
#
# ▼ 書き方
#   下の deliverable_type の値を、自分が作るものに合わせて
#   次の 4 つのどれか 1 つに書きかえて、コミットするだけ。
#
#     code    … プログラミング作品（ゲーム・アプリ・Web サイトなど）
#     video   … 動画作品（ショートムービー・PR 動画など）
#     design  … デザイン作品（ポスター・ロゴ・UI デザインなど）
#     model3d … 3D モデリング作品（Blender などで作る 3D モデル）
#
# ▼ 注意
#   ・値は半角英字で、上の 4 つのどれかをそのまま書く（例: video）
#   ・迷ったら先生に相談。途中でタイプを変えたくなったときも、
#     このファイルを書きかえてコミットすれば OK
# ============================================================

deliverable_type: code
